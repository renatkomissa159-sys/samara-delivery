<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENATKO GPS Tracker</title>
<style>
body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
button { padding: 20px 40px; font-size: 20px; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
#status { margin-top: 20px; color: #aaa; }
</style>
</head>
<body>
    <h1>🚗 GPS TRACKER</h1>
    <button onclick="startGps()">START GPS</button>
    <div id="status">Нажми кнопку для начала трансляции пути</div>
<script>
function startGps() {
    if (!navigator.geolocation) return alert("GPS не поддерживается");
    document.getElementById("status").innerText = "Поиск спутников...";
    navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        document.getElementById("status").innerText = `Отправка: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        try {
            await fetch("/location", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ lat: latitude, lon: longitude })
            });
        } catch (e) { console.error(e); }
    }, (err) => alert("Ошибка GPS: " + err.message), { enableHighAccuracy: true });
}
</script>
</body>
</html>
