<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RENATKO Delivery Overlay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<style>
body { margin:0; font-family:Arial; background:transparent; color:white; }
#panel { position:absolute; top:20px; left:20px; background:#1c1c1c; padding:14px 18px; border-radius:14px; font-size:17px; line-height:1.5; box-shadow:0 10px 25px rgba(0,0,0,0.6); border: 2px solid #333; }
#panel span { color:#ff2b2b; font-weight: bold; }
#map { position:absolute; bottom:20px; left:20px; width:460px; height:320px; border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.7); border: 3px solid #ff2b2b; }
#zone { position:absolute; top:20px; right:20px; background:#ff2b2b; color:white; padding:10px 14px; border-radius:12px; font-weight:bold; box-shadow: 0 0 15px rgba(255, 43, 43, 0.5); }
#bot { position:absolute; top:70px; right:20px; background:#2a2a2a; color:#fff; padding:10px 14px; border-radius:12px; font-size:14px; border: 1px solid #ff2b2b; }
</style>
</head>
<body>
<div id="panel">
    📦 Заказы: <span id="orders">0</span><br>
    💰 Доход: <span id="money">0</span> ₽<br>
    🚗 Скорость: <span id="speed">0</span> км/ч<br>
    📏 Км: <span id="km">0</span><br>
    📊 Ср. заказ: <span id="avg">0</span> ₽
</div>
<div id="zone">🔥 Кэф: <span id="coef">1.0</span></div>
<div id="bot">🤖 Совет: <span id="bot-text">ждем данные...</span></div>
<div id="map"></div>
<script>
let map = L.map('map').setView([53.1959, 50.1008], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let carIcon = L.icon({ iconUrl: 'bmw_m5_red.png', iconSize: [40, 80], iconAnchor: [20, 40] });
let marker, lastPos;
let route = L.polyline([], {color: "#ff2b2b", weight: 5}).addTo(map);

async function fetchServerData() {
    try {
        // Убрали localhost, теперь берем данные прямо с этого же сервера
        let resStats = await fetch("/stats");
        let data = await resStats.json();
        document.getElementById("orders").innerText = data.orders || 0;
        document.getElementById("money").innerText = data.income || 0;
        document.getElementById("km").innerText = (data.distance || 0).toFixed(2);
        document.getElementById("avg").innerText = data.orders ? Math.round(data.income / data.orders) : 0;
        if (data.lat && data.lon) {
            if(!marker) {
                marker = L.marker([data.lat, data.lon], {icon: carIcon}).addTo(map);
                map.setView([data.lat, data.lon], 15);
            }
            marker.setLatLng([data.lat, data.lon]);
            route.addLatLng([data.lat, data.lon]);
            map.panTo([data.lat, data.lon]);
        }
        let resZone = await fetch("/best_zone");
        let zoneData = await resZone.json();
        if (zoneData.zone) document.getElementById("bot-text").innerText = "Лучшая зона: " + zoneData.zone;
    } catch (err) { console.error("Ошибка обновления:", err); }
}
setInterval(fetchServerData, 2000);
</script>
</body>
</html>
